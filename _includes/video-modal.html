<!-- Video Modal Include for Posts -->
<div id="videoModal-{{ include.id | default: 'default' }}" class="video-modal-overlay">
  <div class="video-modal-container">
    <div class="video-modal-content">
      <button class="video-modal-close" aria-label="Close video">&times;</button>
      <video id="modalVideo-{{ include.id | default: 'default' }}" controls preload="metadata">
        <source id="videoSource-{{ include.id | default: 'default' }}" src="" type="">
        Your browser does not support the video tag.
      </video>
    </div>
  </div>
</div>

<script>
(function() {
  var modalId = 'videoModal-{{ include.id | default: "default" }}';
  var videoId = 'modalVideo-{{ include.id | default: "default" }}';
  var sourceId = 'videoSource-{{ include.id | default: "default" }}';
  
  var modal = document.getElementById(modalId);
  var video = document.getElementById(videoId);
  var videoSource = document.getElementById(sourceId);
  var closeBtn = modal.querySelector('.video-modal-close');

  // Function to open modal with video
  window.openVideoModal = function(videoUrl, targetId) {
    var targetModalId = targetId ? 'videoModal-' + targetId : modalId;
    var targetVideoId = targetId ? 'modalVideo-' + targetId : videoId;
    var targetSourceId = targetId ? 'videoSource-' + targetId : sourceId;
    
    var targetModal = document.getElementById(targetModalId);
    var targetVideo = document.getElementById(targetVideoId);
    var targetSource = document.getElementById(targetSourceId);
    
    if (!targetModal || !targetVideo || !targetSource) return;
    
    var extension = videoUrl.split('.').pop().split('?')[0].toLowerCase();
    var mimeType = extension === 'webm' ? 'video/webm' : 'video/mp4';
    
    targetSource.src = videoUrl;
    targetSource.type = mimeType;
    targetVideo.load();
    targetModal.style.display = 'block';
    
    // Prevent body scrolling
    document.body.style.overflow = 'hidden';
    
    // Autoplay after load
    targetVideo.addEventListener('loadeddata', function onLoad() {
      targetVideo.play().catch(function(err) {
        console.log('Autoplay prevented:', err);
      });
      targetVideo.removeEventListener('loadeddata', onLoad);
    });
  };

  // Close modal and stop video
  function closeModal() {
    modal.style.display = 'none';
    video.pause();
    video.currentTime = 0;
    document.body.style.overflow = '';
  }

  // Close button click
  closeBtn.onclick = function(e) {
    e.stopPropagation();
    closeModal();
  };

  // Click on overlay background to close
  modal.onclick = function(event) {
    if (event.target === modal || event.target === modal.querySelector('.video-modal-container')) {
      closeModal();
    }
  };

  // Prevent clicks on video itself from closing modal
  video.onclick = function(event) {
    event.stopPropagation();
  };

  // ESC key to close
  document.addEventListener('keydown', function(event) {
    if (event.key === 'Escape' && modal.style.display === 'block') {
      closeModal();
    }
  });
})();
</script>
