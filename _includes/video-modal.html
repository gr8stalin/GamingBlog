<!-- Video Modal Include for Posts -->
<div id="videoModal-{{ include.id | default: 'default' }}" class="video-modal-overlay">
  <div class="video-modal-container">
    <div class="video-modal-content">
      <button class="video-modal-close" aria-label="Close video">&times;</button>
      <video id="modalVideo-{{ include.id | default: 'default' }}" controls preload="metadata">
        <source id="videoSource-{{ include.id | default: 'default' }}" src="" type="">
        Your browser does not support the video tag.
      </video>
    </div>
  </div>
</div>

<script src="{{ '/assets/js/video-modal.js' | relative_url }}"></script>
